<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>REDEEM STORE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ============================================ */
        /* ===== RESET & BASE ===== */
        /* ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: #F5F7FA;
            color: #1A1A2E;
            padding-bottom: 80px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ============================================ */
        /* ===== PAGE CONTAINER ===== */
        /* ============================================ */
        .page-container {
            max-width: 480px;
            margin: 0 auto;
            background: #FFFFFF;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.05);
        }

        /* ============================================ */
        /* ===== HEADER ===== */
        /* ============================================ */
        .app-header {
            background: #1A73E8;
            padding: 14px 16px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(26, 115, 232, 0.15);
        }

        .app-header .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .app-header .menu-icon {
            color: white;
            font-size: 22px;
            cursor: pointer;
        }

        .app-header .logo {
            color: white;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .app-header .logo span {
            color: #6EF3E8;
        }

        .app-header .header-right {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .app-header .header-right i {
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        .app-header .search-box {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50px;
            padding: 6px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            cursor: pointer;
        }

        .app-header .search-box i {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.6);
        }

        /* ============================================ */
        /* ===== BOTTOM NAVIGATION ===== */
        /* ============================================ */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #FFFFFF;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            padding: 0 4px;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.06);
            border-top: 1px solid #f0f0f0;
            z-index: 999;
            direction: rtl;
            max-width: 480px;
            margin: 0 auto;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #999;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            padding: 4px 8px;
            text-decoration: none;
            background: transparent;
            border: none;
            min-width: 55px;
            flex: 1;
            text-align: center;
        }

        .nav-item i {
            font-size: 22px;
            margin-bottom: 2px;
            transition: all 0.25s ease;
        }

        .nav-item span {
            transition: all 0.25s ease;
            font-weight: 500;
            font-size: 11px;
        }

        .nav-item.active {
            color: #1A73E8;
        }

        .nav-item.active i {
            transform: translateY(-4px) scale(1.1);
            color: #1A73E8;
        }

        .nav-item.active span {
            color: #1A73E8;
        }

        .nav-indicator {
            position: absolute;
            top: 0;
            height: 3px;
            background: #1A73E8;
            border-radius: 4px;
            transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            width: 30px;
            left: 0;
            opacity: 0;
        }

        .nav-indicator.show {
            opacity: 1;
        }

        /* ============================================ */
        /* ===== PAGES ===== */
        /* ============================================ */
        .page {
            display: none;
            padding: 20px 16px 30px;
            animation: fadeUp 0.3s ease;
            background: #FFFFFF;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(12px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============================================ */
        /* ===== HOME PAGE ===== */
        /* ============================================ */
        .store-title {
            text-align: center;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 1px;
            margin: 20px 0 10px;
            padding: 10px 0;
        }

        .store-title .blue {
            color: #1A73E8;
        }

        .store-title .cyan {
            color: #00BCD4;
        }

        .tabs-wrapper {
            position: relative;
            background: #f8f9fa;
            border-radius: 50px;
            padding: 6px;
            margin: 16px 0 20px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        }

        .tab-btn {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            border: none;
            background: transparent;
            font-size: 15px;
            font-weight: 600;
            color: #777;
            cursor: pointer;
            transition: color 0.2s;
            border-radius: 40px;
            z-index: 2;
            position: relative;
            letter-spacing: 0.3px;
        }

        .tab-btn.active {
            color: #1A73E8;
        }

        .tab-slider {
            position: absolute;
            height: 100%;
            top: 0;
            right: 0;
            background: #FFFFFF;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.15);
            transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            z-index: 1;
            width: 25%;
        }

        /* ===== PRODUCTS GRID ===== */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 10px;
            direction: rtl;
        }

        @media (min-width: 600px) {
            .products-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 14px;
            }
        }

        @media (min-width: 900px) {
            .products-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 16px;
            }
        }

        .product-card {
            background: #FFFFFF;
            border-radius: 14px;
            padding: 4px 4px 10px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            text-align: center;
            transition: all 0.2s;
            border: 1px solid #f0f0f0;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 150px;
        }

        .product-card:active {
            transform: scale(0.97);
        }

        .product-card img {
            width: 100%;
            max-width: 100%;
            height: auto;
            aspect-ratio: 1/1;
            object-fit: contain;
            margin-bottom: 4px;
            border-radius: 10px;
            background: #fafafa;
            position: relative;
            z-index: 1;
            padding: 0px;
        }

        .product-card h4 {
            font-size: 13px;
            font-weight: 700;
            color: #222;
            position: relative;
            z-index: 1;
            margin-top: 0px;
            padding: 0 4px;
            line-height: 1.3;
        }

        /* ============================================ */
        /* ===== RIPPLE EFFECTS ===== */
        /* ============================================ */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(26, 115, 232, 0.15);
            transform: scale(0);
            animation: rippleAnim 0.6s ease-out forwards;
            pointer-events: none;
        }

        .ripple-btn {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            transform: scale(0);
            animation: rippleAnim 0.6s ease-out forwards;
            pointer-events: none;
        }

        .ripple-effect {
            position: absolute;
            border-radius: 50%;
            background: rgba(26, 115, 232, 0.10);
            transform: scale(0);
            animation: rippleAnim 0.6s ease-out forwards;
            pointer-events: none;
        }

        .ripple-faq {
            position: absolute;
            border-radius: 50%;
            background: rgba(26, 115, 232, 0.08);
            transform: scale(0);
            animation: rippleAnim 0.6s ease-out forwards;
            pointer-events: none;
        }

        @keyframes rippleAnim {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        .fade-out {
            animation: fadeOut 0.25s ease forwards;
        }

        @keyframes fadeOut {
            0% {
                opacity: 1;
                transform: scale(1);
            }
            100% {
                opacity: 0;
                transform: scale(0.95);
            }
        }

            background: #FFFFFF;

        .pack-btn .price-amount {
            display: block;
            font-size: 15px;
            font-weight: 500;
            color: #888;
            margin-top: 4px;
            transition: color 0.25s ease;
        }

        .pack-btn.selected {
            border-color: #1A73E8;
            border-width: 2px;

            background: #FFFFFF;
        }

        }

        .shipping-form.hidden {

        }

        .shipping-form label {
            display: block;
            font-weight: 900;
            color: #000000;
            margin: 12px 0 6px;
            font-size: 14px;
            text-align: right;
        }

        .shipping-form label:first-of-type {
            margin-top: 0;
        }

        .shipping-form input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #eaeaea;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 400;

            text-align: right;
            direction: rtl;
        }

        .shipping-form input::placeholder {
            text-align: right;

            font-weight: 400;
        }

        .shipping-form input:focus {
            border-color: #1A73E8;
            outline: none;
            box-shadow: 0 0 0 4px rgba(26, 115, 232, 0.08);
        }

        .btn-buy {
            width: 100%;
            padding: 16px 24px;
            background: #1A73E8;
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;

            box-shadow: 0 6px 20px rgba(26, 115, 232, 0.25);

        }

        .btn-buy:active {

            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .transaction-icon-wallet.deposit {
            background: rgba(26, 115, 232, 0.12);
            color: #1A73E8;
        }

        .transaction-icon-wallet.withdraw {
            background: rgba(239, 68, 68, 0.10);
            color: #EF4444;
        }

        .transaction-icon-wallet.purchase {
            background: rgba(0, 188, 212, 0.12);
            color: #00BCD4;
        }

        .transaction-icon-wallet.refund {
            background: rgba(251, 191, 36, 0.12);
            color: #F59E0B;
        }

        .transaction-info-wallet h4 {
            font-size: 14px;
            font-weight: 700;
            color: #222;
        }

        .transaction-info-wallet span {
            font-size: 12px;
            color: #999;
            font-weight: 400;
        }

        .transaction-amount-wallet {
            font-size: 15px;
            font-weight: 700;
            text-align: left;
        }

        .transaction-amount-wallet.positive {
            color: #1A73E8;
        }

        .transaction-amount-wallet.negative {
            color: #EF4444;
        }

        /* ============================================ */
        /* ===== DEPOSIT METHOD SELECTION ===== */
        /* ============================================ */
        .deposit-page {
            display: none;
            padding: 0;
            background: #FFFFFF;
            min-height: 100vh;
            position: relative;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.3s ease;
            opacity: 0;
        }

        .deposit-page.active {
            display: block;
            transform: translateX(0);
            opacity: 1;
        }

        .deposit-page.slide-out {
            transform: translateX(-30%);
            opacity: 0;
        }

        .deposit-top-bar {
            padding: 16px 16px 0 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: #FFFFFF;
        }

        .deposit-top-bar .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: none;
            background: #f0f0f0;
            color: #333;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .deposit-top-bar .back-btn:active {
            transform: scale(0.92);
            background: #e0e0e0;
        }

        .deposit-top-bar .page-title {
            font-size: 20px;
            font-weight: 700;
            color: #1A1A2E;
        }

        .deposit-top-bar .page-sub {
            font-size: 13px;
            color: #999;
            font-weight: 400;
        }

        .deposit-body {
            padding: 16px 16px 30px;
            background: #FFFFFF;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: #1A1A2E;
            margin-bottom: 20px;
            padding-right: 4px;
            letter-spacing: 0.3px;
        }

        .method-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .method-item {
            background: #FFFFFF;
            border: 1px solid #E8EAED;
            border-radius: 18px;
            padding: 20px 14px 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            -webkit-tap-highlight-color: transparent;
            position: relative;
            overflow: hidden;
            min-height: 140px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            aspect-ratio: 1 / 1.1;
        }

        @media (hover: hover) {
            .method-item:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
                border-color: #B5D4F0;
            }
        }

        .method-item:active {
            transform: scale(0.97);
        }

        .method-item.selected {
            border-color: #1A73E8;
            border-width: 2px;
            box-shadow: 0 8px 28px rgba(26, 115, 232, 0.16);
            transform: translateY(-2px);
        }

        .method-item.selected .method-icon-wrapper {
            border-color: #1A73E8;
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.12);
        }

        .method-item .method-icon-wrapper {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            border: 2px solid #E8EAED;
            background: #FAFBFC;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            transition: all 0.3s ease;
            flex-shrink: 0;
            overflow: hidden;
            padding: 0;
        }

        .method-item .method-icon-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 14px;
            display: block;
        }

        .method-item .method-name {
            font-size: 16px;
            font-weight: 700;
            color: #1A1A2E;
            margin-bottom: 3px;
            transition: color 0.25s ease;
            letter-spacing: 0.2px;
        }

        .method-item.selected .method-name {
            color: #1A73E8;
        }

        .method-item .method-desc {
            font-size: 12px;
            color: #999;
            font-weight: 400;
            letter-spacing: 0.1px;
        }

        .method-item .check-mark {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #1A73E8;
            color: white;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .method-item.selected .check-mark {
            opacity: 1;
            transform: scale(1);
        }

        /* ============================================ */
        /* ===== DEPOSIT DETAIL PAGE ===== */
        /* ============================================ */
        .deposit-detail-page {
            display: none;
            padding: 0;
            background: #F5F7FA;
            min-height: 100vh;
            position: relative;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.3s ease;
            opacity: 0;
        }

        .deposit-detail-page.active {
            display: block;
            transform: translateX(0);
            opacity: 1;
        }

        .deposit-detail-page.slide-out {
            transform: translateX(-30%);
            opacity: 0;
        }

        /* ===== إخفاء الهيدر ===== */
        .deposit-detail-page .detail-header-simple {
            display: none;
        }

        /* ===== BODY ===== */
        .detail-body {
            padding: 16px 16px 70px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #F5F7FA;
        }

        /* ===== ACCOUNT CARD ===== */
        .account-card {
            background: #FFFFFF;
            border: 1px solid #E8EAED;
            padding: 16px 18px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .account-card .account-label {
            font-size: 12px;
            font-weight: 700;
            color: #1A1A2E;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        .account-card .account-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .account-card .account-number {
            font-size: 20px;
            font-weight: 700;
            color: #1A1A2E;
            font-family: 'SF Mono', 'Courier New', monospace;
            letter-spacing: 0.5px;
            direction: ltr;
            text-align: left;
        }

        .account-card .copy-btn {
            width: 34px;
            height: 34px;
            border: none;
            background: transparent;
            color: #8895A7;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            flex-shrink: 0;
        }

        .account-card .copy-btn:active {
            background: #F0F2F5;
        }

        .account-card .copy-btn.copied {
            color: #10B981;
        }

        .account-card .account-holder {
            font-size: 14px;
            font-weight: 500;
            color: #555;
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px solid #F0F2F5;
            text-align: right;
            letter-spacing: 0.2px;
        }

        .account-card .account-holder .holder-label {
            font-weight: 600;
            color: #1A1A2E;
        }

        /* ===== FORM FIELDS ===== */
        .field-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .field-group label {
            font-size: 12px;
            font-weight: 600;
            color: #1A1A2E;
            letter-spacing: 0.3px;
        }

        .field-group label .required {
            display: none;
        }

        .field-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .field-input-wrapper input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #E8EAED;
            font-size: 15px;
            font-weight: 500;
            background: #FFFFFF;
            transition: all 0.2s ease;
            color: #1A1A2E;
            border-radius: 10px;
            height: 48px;
            text-align: right;
            direction: rtl;
        }

        .field-input-wrapper input::placeholder {
            color: #B0B8C4;
            font-weight: 400;
            font-size: 14px;
            text-align: right;
        }

        .field-input-wrapper input:focus {
            border-color: #1A73E8;
            outline: none;
            box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.08);
        }

        .field-input-wrapper input.input-ltr {
            text-align: right;
            direction: rtl;
        }

        .field-input-wrapper input.input-ltr::placeholder {
            text-align: right;
        }

            color: #1A73E8;
            font-size: 20px;
            flex-shrink: 0;
        }

        .file-upload-mini .upload-text {
            font-size: 14px;
            font-weight: 500;

            gap: 8px;

            width: 34px;

            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #E8EAED;
