<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>REDEEM STORE</title>
    <!-- Font Awesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #FFFFFF;
            color: #222;
            padding-bottom: 80px;
            min-height: 100vh;
        }

        /* ===== BOTTOM NAVIGATION ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #FFFFFF;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            padding: 0 4px;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.06);
            border-top: 1px solid #f0f0f0;
            z-index: 999;
            direction: rtl;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #999;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            padding: 4px 8px;
            text-decoration: none;
            background: transparent;
            border: none;
            min-width: 55px;
            flex: 1;
            text-align: center;
        }

        .nav-item:first-child {
            margin-right: 0;
        }

        .nav-item:last-child {
            margin-left: 0;
        }

        .nav-item i {
            font-size: 22px;
            margin-bottom: 2px;
            transition: all 0.25s ease;
        }

        .nav-item span {
            transition: all 0.25s ease;
            font-weight: 500;
            font-size: 11px;
        }

        .nav-item.active {
            color: #1A73E8;
        }

        .nav-item.active i {
            transform: translateY(-4px) scale(1.1);
            color: #1A73E8;
        }

        .nav-item.active span {
            color: #1A73E8;
        }

        .nav-indicator {
            position: absolute;
            top: 0;
            height: 3px;
            background: #1A73E8;
            border-radius: 4px;
            transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            width: 30px;
            left: 0;
            opacity: 0;
        }

        .nav-indicator.show {
            opacity: 1;
        }

        /* ===== PAGES ===== */
        .page {
            display: none;
            padding: 20px 16px 30px;
            animation: fadeUp 0.3s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(12px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== HOME PAGE ===== */
        .store-title {
            text-align: center;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 1px;
            margin: 20px 0 10px;
            padding: 10px 0;
        }

        .store-title .blue {
            color: #1A73E8;
        }

        .store-title .cyan {
            color: #00BCD4;
        }

        /* ===== CATEGORIES TABS - IMPROVED ===== */
        .tabs-wrapper {
            position: relative;
            background: #f8f9fa;
            border-radius: 50px;
            padding: 6px;
            margin: 16px 0 20px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        }

        .tab-btn {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            border: none;
            background: transparent;
            font-size: 15px;
            font-weight: 600;
            color: #777;
            cursor: pointer;
            transition: color 0.2s;
            border-radius: 40px;
            z-index: 2;
            position: relative;
            letter-spacing: 0.3px;
            /* تحسين المسافات بين الحروف */
        }

        .tab-btn.active {
            color: #1A73E8;
        }

        .tab-slider {
            position: absolute;
            height: 100%;
            top: 0;
            right: 0;
            background: #FFFFFF;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.15);
            transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            z-index: 1;
            width: 25%;
        }

        /* ===== PRODUCTS GRID ===== */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-top: 10px;
            direction: rtl;
        }

        @media (min-width: 600px) {
            .products-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (min-width: 900px) {
            .products-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .product-card {
            background: #FFFFFF;
            border-radius: 20px;
            padding: 16px 8px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05);
            text-align: center;
            transition: all 0.2s;
            border: 1px solid #f0f0f0;
            cursor: pointer;
        }

        .product-card:active {
            transform: scale(0.96);
        }

        .product-card img {
            width: 100%;
            max-width: 80px;
            height: auto;
            aspect-ratio: 1/1;
            object-fit: contain;
            margin-bottom: 8px;
            border-radius: 12px;
            background: #fafafa;
        }

        .product-card h4 {
            font-size: 14px;
            font-weight: 700;
            color: #222;
        }

        .product-card .price-tag {
            font-size: 13px;
            color: #1A73E8;
            font-weight: 600;
            margin-top: 4px;
        }

        /* ===== SUPPORT PAGE ===== */
        .game-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 24px;
        }

        .game-header img {
            width: 64px;
            height: 64px;
            object-fit: contain;
            border-radius: 16px;
            background: #fff;
        }

        .game-header h2 {
            font-size: 22px;
            font-weight: 800;
        }

        .packs-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 16px 0;
        }

        .pack-btn {
            background: #f8f9fa;
            border: 2px solid #eaeaea;
            border-radius: 16px;
            padding: 14px 4px;
            text-align: center;
            font-weight: 700;
            font-size: 15px;
            color: #222;
            cursor: pointer;
            transition: all 0.2s;
        }

        .pack-btn.selected {
            border-color: #1A73E8;
            background: #e8f0fe;
            color: #1A73E8;
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.15);
        }

        .pack-btn small {
            display: block;
            font-weight: 400;
            font-size: 13px;
            color: #666;
            margin-top: 4px;
        }

        .pack-btn.selected small {
            color: #1A73E8;
        }

        .shipping-form {
            background: #f8f9fa;
            border-radius: 24px;
            padding: 20px;
            margin-top: 20px;
            animation: fadeUp 0.3s ease;
        }

        .shipping-form label {
            display: block;
            font-weight: 600;
            margin: 12px 0 4px;
            font-size: 14px;
        }

        .shipping-form input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #eaeaea;
            border-radius: 16px;
            font-size: 16px;
            background: #fff;
            transition: 0.2s;
            direction: ltr;
        }

        .shipping-form input:focus {
            border-color: #1A73E8;
            outline: none;
            box-shadow: 0 0 0 4px rgba(26, 115, 232, 0.1);
        }

        .btn-buy {
            width: 100%;
            padding: 16px;
            background: #1A73E8;
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 20px rgba(26, 115, 232, 0.3);
        }

        .btn-buy:active {
            transform: scale(0.97);
            box-shadow: 0 3px 10px rgba(26, 115, 232, 0.2);
        }

        /* ===== WALLET & ACCOUNT ===== */
        .placeholder-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            color: #999;
            font-size: 18px;
        }

        .placeholder-page i {
            font-size: 64px;
            color: #ddd;
            margin-bottom: 16px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 420px) {
            .store-title {
                font-size: 26px;
            }
            .tab-btn {
                font-size: 13px;
                padding: 10px 0;
            }
            .pack-btn {
                font-size: 13px;
                padding: 10px 4px;
            }
            .game-header h2 {
                font-size: 18px;
            }
            .nav-item span {
                font-size: 10px;
            }
            .nav-item i {
                font-size: 20px;
            }
        }

        /* ===== TAB NAMES WITHOUT EMOJIS ===== */
        /* تم إزالة جميع الإيموجيات من الـ HTML مباشرة */
    </style>
</head>
<body>

    <!-- ============================================= -->
    <!-- الصفحات -->
    <!-- ============================================= -->

    <!-- الصفحة الرئيسية -->
    <div id="page-home" class="page active">
        <div class="store-title">
            <span class="blue">REDEEM</span>
            <span class="cyan">STORE</span>
        </div>

        <!-- التصنيفات - بدون إيموجيات -->
        <div class="tabs-wrapper" id="tabsContainer">
            <div class="tab-slider" id="tabSlider" style="right:0%;"></div>
            <button class="tab-btn active" data-tab="games">الألعاب</button>
            <button class="tab-btn" data-tab="subscriptions">الاشتراكات</button>
            <button class="tab-btn" data-tab="stores">المتاجر</button>
            <button class="tab-btn" data-tab="services">خدمات مميزة</button>
        </div>

        <!-- شبكة المنتجات -->
        <div id="productsContainer">
            <div class="products-grid" id="productsGrid">
                <!-- سيتم تعبئتها بواسطة JS -->
            </div>
        </div>
    </div>

    <!-- صفحة المحفظة -->
    <div id="page-wallet" class="page">
        <div class="placeholder-page">
            <i class="fas fa-wallet"></i>
            <p>محفظتك الرقمية</p>
            <span style="font-size:14px; color:#ccc;">0.00 $</span>
        </div>
    </div>

    <!-- صفحة الدعم -->
    <div id="page-support" class="page">
        <div class="game-header">
            <img src="https://i.imgur.com/7VYdLgF.png" alt="PUBG Mobile" />
            <h2>خدمات الدعم</h2>
        </div>

        <div class="packs-grid" id="packsGrid">
            <div class="pack-btn" data-uc="60">60 UC <small>3.00 $</small></div>
            <div class="pack-btn" data-uc="325">325 UC <small>12.00 $</small></div>
            <div class="pack-btn" data-uc="660">660 UC <small>22.00 $</small></div>
            <div class="pack-btn" data-uc="3850">3.850 UC <small>110.00 $</small></div>
            <div class="pack-btn" data-uc="16200">16.200 UC <small>420.00 $</small></div>
        </div>

        <div class="shipping-form" id="shippingForm">
            <label>🆔 ID اللعبة</label>
            <input type="text" placeholder="أدخل ID الخاص بك" id="gameIdInput" />

            <label>📱 رقم واتساب</label>
            <input type="tel" placeholder="مثال: 501234567" id="whatsappInput" />

            <button class="btn-buy" id="buyNowBtn">شراء الآن</button>
        </div>
    </div>

    <!-- صفحة الحساب -->
    <div id="page-account" class="page">
        <div class="placeholder-page">
            <i class="fas fa-user-circle"></i>
            <p>حسابي</p>
            <span style="font-size:14px; color:#ccc;">تسجيل الدخول</span>
        </div>
    </div>

    <!-- ============================================= -->
    <!-- شريط التنقل السفلي -->
    <!-- ============================================= -->
    <nav class="bottom-nav" id="bottomNav">
        <div class="nav-indicator" id="navIndicator"></div>

        <button class="nav-item active" data-page="page-home">
            <i class="fas fa-home"></i>
            <span>الرئيسية</span>
        </button>
        <button class="nav-item" data-page="page-wallet">
            <i class="fas fa-wallet"></i>
            <span>المحفظة</span>
        </button>
        <button class="nav-item" data-page="page-support">
            <i class="fas fa-headset"></i>
            <span>الدعم</span>
        </button>
        <button class="nav-item" data-page="page-account">
            <i class="fas fa-user"></i>
            <span>الحساب</span>
        </button>
    </nav>

    <!-- ============================================= -->
    <!-- JavaScript -->
    <!-- ============================================= -->
    <script>
        // ========================
        // 1. قائمة الألعاب
        // ========================
        const gamesList = [
            { name: 'PUBG Mobile', img: 'https://i.imgur.com/7VYdLgF.png', price: '3.00 $' },
            { name: 'Free Fire', img: 'https://i.imgur.com/0n0QZbJ.png', price: '2.00 $' },
            { name: 'Call of Duty', img: 'https://i.imgur.com/5f7zH1O.png', price: '4.00 $' },
            { name: 'Mobile Legends', img: 'https://i.imgur.com/9WqUj3H.png', price: '3.50 $' },
            { name: 'eFootball', img: 'https://i.imgur.com/1mzLqjP.png', price: '2.50 $' },
            { name: 'Clash of Clans', img: 'https://i.imgur.com/8JQbPkC.png', price: '3.00 $' },
            { name: 'Clash Royale', img: 'https://i.imgur.com/6LQk9nM.png', price: '2.00 $' },
            { name: 'Brawl Stars', img: 'https://i.imgur.com/3pVWcLJ.png', price: '2.50 $' },
            { name: 'Genshin Impact', img: 'https://i.imgur.com/4KQWhpE.png', price: '5.00 $' },
            { name: 'Blood Strike', img: 'https://i.imgur.com/2N9YhVd.png', price: '3.00 $' },
            { name: 'Yalla Ludo', img: 'https://i.imgur.com/7Xr8KcP.png', price: '1.50 $' },
            { name: 'Minecraft', img: 'https://i.imgur.com/5JmVb8Z.png', price: '6.00 $' }
        ];

        // ========================
        // 2. عرض الألعاب
        // ========================
        const productsGrid = document.getElementById('productsGrid');

        function renderGames() {
            productsGrid.innerHTML = '';
            gamesList.forEach(game => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${game.img}" alt="${game.name}" loading="lazy" />
                    <h4>${game.name}</h4>
                    <div class="price-tag">${game.price}</div>
                `;
                if (game.name === 'PUBG Mobile') {
                    card.addEventListener('click', () => {
                        switchPage('page-support');
                        updateNavActive('page-support');
                    });
                }
                productsGrid.appendChild(card);
            });
        }
        renderGames();

        // ========================
        // 3. التصنيفات (Tabs)
        // ========================
        const tabsContainer = document.getElementById('tabsContainer');
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabSlider = document.getElementById('tabSlider');

        function filterProducts(category) {
            productsGrid.style.opacity = '0.6';
            productsGrid.style.transform = 'translateY(8px)';
            setTimeout(() => {
                productsGrid.style.opacity = '1';
                productsGrid.style.transform = 'translateY(0)';
            }, 250);
        }

        tabBtns.forEach((btn, index) => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                const percent = index * 25;
                tabSlider.style.right = percent + '%';

                filterProducts(btn.dataset.tab);
            });
        });

        // ========================
        // 4. شريط التنقل
        // ========================
        const navItems = document.querySelectorAll('.nav-item');
        const navIndicator = document.getElementById('navIndicator');

        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const target = document.getElementById(pageId);
            if (target) target.classList.add('active');
        }

        function updateNavActive(pageId) {
            navItems.forEach(item => {
                item.classList.remove('active');
                if (item.dataset.page === pageId) {
                    item.classList.add('active');
                }
            });

            const activeItem = document.querySelector('.nav-item.active');
            if (activeItem) {
                const navRect = document.querySelector('.bottom-nav').getBoundingClientRect();
                const itemRect = activeItem.getBoundingClientRect();
                const leftPos = itemRect.left - navRect.left + (itemRect.width / 2) - 15;
                navIndicator.style.left = leftPos + 'px';
                navIndicator.style.width = '30px';
                navIndicator.classList.add('show');
            }
        }

        navItems.forEach(item => {
            item.addEventListener('click', () => {
                const pageId = item.dataset.page;
                if (pageId) {
                    switchPage(pageId);
                    updateNavActive(pageId);
                }
            });
        });

        setTimeout(() => {
            updateNavActive('page-home');
        }, 100);

        // ========================
        // 5. باقات الدعم
        // ========================
        const packBtns = document.querySelectorAll('.pack-btn');
        let selectedPack = null;

        packBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                packBtns.forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedPack = btn.dataset.uc;
            });
        });

        // ========================
        // 6. زر الشراء
        // ========================
        document.getElementById('buyNowBtn').addEventListener('click', () => {
            const gameId = document.getElementById('gameIdInput').value.trim();
            const whatsapp = document.getElementById('whatsappInput').value.trim();

            if (!selectedPack) {
                alert('⚠️ يرجى اختيار باقة الشحن أولاً.');
                return;
            }
            if (!gameId) {
                alert('⚠️ يرجى إدخال ID اللعبة.');
                return;
            }
            if (!whatsapp) {
                alert('⚠️ يرجى إدخال رقم واتساب.');
                return;
            }

            alert(`✅ تم تقديم طلب شراء باقة ${selectedPack} UC\n🆔 ID: ${gameId}\n📱 واتساب: ${whatsapp}\n\nسيتم التواصل معك قريباً.`);
        });

        // ========================
        // 7. تحديد أول باقة
        // ========================
        if (packBtns.length) {
            packBtns[0].classList.add('selected');
            selectedPack = packBtns[0].dataset.uc;
        }

        // ========================
        // 8. منع إعادة التحميل
        // ========================
        document.querySelectorAll('button').forEach(b => {
            b.addEventListener('click', (e) => {
                if (b.closest('.bottom-nav') || b.closest('.tabs-wrapper') || b.closest('.pack-btn') || b.id ===
                    'buyNowBtn') {
                    e.preventDefault();
                }
            });
        });

        console.log('🚀 REDEEM STORE جاهز بالكامل!');
    </script>

</body>
</html>
